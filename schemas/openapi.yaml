          type: string
      required:
      - job_id
      - status_url
    GenerationJob:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        prompt:
          type: string
          readOnly: true
        negative_prompt:
          type: string
          readOnly: true
        variants_count:
          type: integer
          readOnly: true
        aspect_ratio:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/GenerationJobStatusEnum'
          readOnly: true
        image_urls:
          type: array
          items:
            type: string
          readOnly: true
        error:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - aspect_ratio
      - created_at
      - error
      - id
      - image_urls
      - negative_prompt
      - prompt
      - status
      - updated_at
      - variants_count
    GenerationJobStatusEnum:
      enum:
      - queued
      - running
      - ready
      - failed
      type: string
      description: |-
        * `queued` - Queued
        * `running` - Running
        * `ready` - Ready
        * `failed` - Failed
    Health:
      type: object
      properties:
        ok:
          type: boolean
      required:
      - ok
    KindEnum:
      enum:
      - post
      - avatar
      type: string
      description: |-
        * `post` - Post
        * `avatar` - Avatar
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    MediaProcessedRequest:
      type: object
      properties:
        s3_key:
          type: string
