          minLength: 1
          maxLength: 500
        negative_prompt:
          type: string
          default: ''
          maxLength: 500
        variants_count:
          type: integer
          maximum: 4
          minimum: 1
        aspect_ratio:
          $ref: '#/components/schemas/AspectRatioEnum'
      required:
      - aspect_ratio
      - prompt
      - variants_count
    GenerationCreateResponse:
      type: object
      properties:
        job_id:
          type: integer
