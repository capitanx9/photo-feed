      description: |-
        * `ready` - ready
        * `failed` - failed
    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/OrderStatusEnum'
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        payment_method:
          type: string
          maxLength: 32
        shipping_name:
          type: string
          maxLength: 128
        shipping_address:
          type: string
          maxLength: 256
        shipping_city:
          type: string
          maxLength: 128
        shipping_zip:
          type: string
          maxLength: 32
        shipping_country:
          type: string
          maxLength: 64
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
