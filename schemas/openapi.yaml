      description: |-
        * `pending` - Pending
        * `ready` - Ready
        * `failed` - Failed
    PostRequest:
      type: object
      properties:
        caption:
          type: string
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
    PostStatusEnum:
      enum:
      - draft
      - published
      type: string
      description: |-
        * `draft` - Draft
        * `published` - Published
