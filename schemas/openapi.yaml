      - shipping_address
      - shipping_city
      - shipping_name
      - shipping_zip
      - status
      - total
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        post_id:
          type: integer
          readOnly: true
        qty:
