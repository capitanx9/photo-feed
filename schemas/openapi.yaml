      description: |-
        * `paid` - Paid
        * `shipped` - Shipped
        * `cancelled` - Cancelled
    PaginatedOrderList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cD00ODY%3D"
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/Order'
    PaginatedPostList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cD00ODY%3D"
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/Post'
    PatchedCartItemUpdateRequest:
      type: object
      properties:
        qty:
          type: integer
          minimum: 1
    PatchedPostRequest:
      type: object
      properties:
        caption:
          type: string
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
    PatchedUserUpdateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
    PaymentMethodEnum:
      enum:
      - card
      - paypal
      - crypto
      - cod
      type: string
      description: |-
        * `card` - card
        * `paypal` - paypal
        * `crypto` - crypto
        * `cod` - cod
    Post:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        owner_id:
          type: integer
          readOnly: true
        caption:
          type: string
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        status:
          allOf:
          - $ref: '#/components/schemas/PostStatusEnum'
          readOnly: true
        media:
          type: array
          items:
            $ref: '#/components/schemas/PostMedia'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - media
      - owner_id
      - status
    PostCreateRequest:
      type: object
      properties:
        caption:
          type: string
          default: ''
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        media_ids:
          type: array
          items:
            type: integer
      required:
      - media_ids
    PostMedia:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        kind:
          allOf:
          - $ref: '#/components/schemas/KindEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/PostMediaStatusEnum'
          readOnly: true
        url:
          type: string
          nullable: true
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - kind
      - status
      - url
    PostMediaStatusEnum:
      enum:
      - pending
      - ready
      - failed
