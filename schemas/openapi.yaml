openapi: 3.0.3
info:
  title: photo-feed API
  version: 0.1.0
paths:
  /api/health/:
    get:
      operationId: api_health_retrieve
      description: Returns 200 if the Django process is alive and able to respond.
        Used by load balancer health checks and CD smoke tests.
      summary: Liveness probe
      tags:
      - health
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
          description: ''
  /api/auth/register/:
    post:
      operationId: api_auth_register_create
      description: Creates an active user with the given email and password. Does
        not log the user in — issue a POST /api/auth/login/ next. Rate-limited to
        5 requests per minute per IP.
      summary: Register a new user
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation error
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Rate limit exceeded
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      description: Verifies credentials and sets HttpOnly access/refresh cookies.
        Access cookie is scoped to /, refresh cookie is scoped to /api/auth/. Rate-limited
        to 10 requests per minute per IP.
      summary: Login with email and password
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation error
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Rate limit exceeded
  /api/auth/logout/:
    post:
      operationId: api_auth_logout_create
      description: Blacklists the current refresh token and clears both auth cookies.
        Requires a valid access cookie.
      summary: Logout and clear cookies
      tags:
      - auth
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
  /api/auth/refresh/:
    post:
      operationId: api_auth_refresh_create
      description: Reads the refresh cookie, blacklists it, and issues a new access/refresh
        pair as HttpOnly cookies. Replay of a used refresh token returns 401.
      summary: Rotate access and refresh tokens
      tags:
      - auth
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
  /api/auth/me/:
    get:
      operationId: api_auth_me_retrieve
      description: Returns the authenticated user's id and email.
      summary: Get the current user
      tags:
      - auth
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
    patch:
      operationId: api_auth_me_partial_update
      description: Patch the authenticated user. Email is the only mutable field for
        now.
      summary: Update the current user
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation error
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
  /api/users/{id}/:
    get:
      operationId: api_users_retrieve
      description: Public profile data for the given user id.
      summary: Retrieve a public user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - users
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
  /api/users/{id}/posts/:
    get:
      operationId: api_users_posts_list
      description: Public — published posts for the given user id.
      summary: List posts by user
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - users
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPostList'
          description: ''
  /api/posts/:
    get:
      operationId: api_posts_list
      description: Cursor-paginated feed of published posts, newest first.
      summary: List posts
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - posts
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPostList'
          description: ''
    post:
      operationId: api_posts_create
      description: Creates a post and attaches the listed media (which must belong
        to the caller and have status='ready'). Media must have been uploaded via
        /api/posts/upload-url/.
      summary: Create a post
      tags:
      - posts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PostCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PostCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation error
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
  /api/posts/upload-url/:
    post:
      operationId: api_posts_upload_url_create
      description: Validates intended content type and size, creates a pending PostMedia
        row, and returns a short-lived presigned PUT URL. Client must PUT the file
        with the exact Content-Type and Content-Length they passed here. After upload,
        an S3 event triggers the cut_image Lambda which posts back to /internal/media/<id>/processed/.
      summary: Request a presigned S3 upload URL
      tags:
      - posts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadURLRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UploadURLRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadURLRequestRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadURLResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation error
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
  /api/posts/media/{id}/:
    get:
      operationId: api_posts_media_retrieve
      description: Owner-only poll for upload/resize status.
      summary: Get media status
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - posts
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostMedia'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
  /api/posts/{id}/:
    get:
      operationId: api_posts_retrieve
      description: Public.
      summary: Retrieve a post
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - posts
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
    put:
      operationId: api_posts_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PostRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PostRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
          description: ''
    patch:
      operationId: api_posts_partial_update
      description: Owner only. Caption/price.
      summary: Update a post
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - posts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPostRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPostRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPostRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
    delete:
      operationId: api_posts_destroy
      description: Owner only.
      summary: Delete a post
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - posts
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
  /api/cart/:
    get:
      operationId: api_cart_retrieve
      description: Returns (or creates) the cart for the authenticated user.
      summary: Get the current cart
      tags:
      - cart
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
  /api/cart/items/:
    post:
      operationId: api_cart_items_create
      description: Adds the given post to the cart. If the post is already in the
        cart, the qty is incremented by the supplied amount (default 1). Posts without
        a price cannot be added.
      summary: Add an item to the cart
      tags:
      - cart
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemAddRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CartItemAddRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CartItemAddRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItem'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation error
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
  /api/cart/items/{id}/:
    patch:
      operationId: api_cart_items_partial_update
      description: Sets the item's qty to the value in the body.
      summary: Update cart item qty (absolute)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cart
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCartItemUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCartItemUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCartItemUpdateRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItem'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
    delete:
      operationId: api_cart_items_destroy
      description: Owner only.
      summary: Remove an item from the cart
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cart
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
  /api/orders/:
    get:
      operationId: api_orders_list
      description: Cursor-paginated history of the caller's orders, newest first.
      summary: List my orders
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - orders
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrderList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
  /api/orders/checkout/:
    post:
      operationId: api_orders_checkout_create
      description: Snapshots each cart item's current post price into the order, then
        empties the cart. The order is created with status='paid' (no real payment
        integration). Empty carts return 400.
      summary: Create an order from the current cart
      tags:
      - orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation error
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
  /api/orders/{id}/:
    get:
      operationId: api_orders_retrieve
      description: Owner only — 404 for other users' orders.
      summary: Retrieve one of my orders
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - orders
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
  /api/ai/generate/:
    post:
      operationId: api_ai_generate_create
      description: Validates the prompt + variants count + aspect ratio, creates a
        queued GenerationJob, and dispatches a Celery task that boto3-invokes the
        generate_image Lambda in us-west-2. Returns 202 with a polling URL. Rate-limited
        per user (see AI_RATE_LIMIT_PER_HOUR).
      summary: Request image generation
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerationCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GenerationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GenerationCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationCreateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Validation error
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Rate limit exceeded
  /api/ai/jobs/{id}/:
    get:
      operationId: api_ai_jobs_retrieve
      description: Returns the job state plus presigned GET URLs for the result PNGs
        once status is 'ready'. Owner-only.
      summary: Get generation job status
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - ai
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
  /internal/media/processed/:
    post:
      operationId: internal_media_processed_create
      description: 'Called by the cut_image Lambda after a raw upload has been resized.
        Authentication: X-Lambda-Token header must match WEBHOOK_SHARED_SECRET.'
      summary: 'Lambda webhook: media processed'
      tags:
      - internal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaProcessedRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MediaProcessedRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MediaProcessedRequest'
        required: true
      security:
      - {}
      responses:
        '204':
          description: No response body
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Authentication required
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not found
components:
  schemas:
    AspectRatioEnum:
      enum:
      - '1:1'
      - '4:5'
      - '16:9'
      type: string
      description: |-
        * `1:1` - 1:1
        * `4:5` - 4:5
        * `16:9` - 16:9
    Cart:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - items
      - total
      - updated_at
    CartItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        post_id:
          type: integer
          readOnly: true
        qty:
          type: integer
          readOnly: true
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        line_total:
          type: number
          format: double
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - line_total
      - post_id
      - price
      - qty
    CartItemAddRequest:
      type: object
      properties:
        post_id:
          type: integer
        qty:
          type: integer
          minimum: 1
          default: 1
      required:
      - post_id
    CheckoutRequest:
      type: object
      properties:
        payment_method:
          $ref: '#/components/schemas/PaymentMethodEnum'
        shipping_name:
          type: string
          minLength: 1
          maxLength: 128
        shipping_address:
          type: string
          minLength: 1
          maxLength: 256
        shipping_city:
          type: string
          minLength: 1
          maxLength: 128
        shipping_zip:
          type: string
          minLength: 1
          maxLength: 32
        shipping_country:
          type: string
          default: ''
          maxLength: 64
      required:
      - payment_method
      - shipping_address
      - shipping_city
      - shipping_name
      - shipping_zip
    Error:
      type: object
      properties:
        detail:
