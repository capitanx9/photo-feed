services:
  web:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./packages/api/.env
    volumes:
      - ./packages/api/src:/app/packages/api/src
      - ./packages/api/manage.py:/app/packages/api/manage.py
    depends_on:
      - db
      - redis
      - mailhog
      - minio-init

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: api
      POSTGRES_PASSWORD: api  # pragma: allowlist secret
      POSTGRES_DB: api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  # S3-compatible local object store. Stand-in for AWS S3 in dev.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin  # pragma: allowlist secret
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web console (http://localhost:9001)
    volumes:
      - minio_data:/data

  # One-shot init container: waits for MinIO to be ready and creates buckets.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 minioadmin minioadmin > /dev/null 2>&1; do
          sleep 1;
        done;
        mc mb --ignore-existing local/photo-feed-uploads;
        mc mb --ignore-existing local/photo-feed-generated-usw2;
        mc anonymous set download local/photo-feed-uploads || true;
        mc anonymous set download local/photo-feed-generated-usw2 || true;
        echo 'minio-init: buckets ready';
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
