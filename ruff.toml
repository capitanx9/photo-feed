line-length = 100
target-version = "py312"
extend-exclude = [
  ".venv",
  "migrations",
  "staticfiles",
  "media",
]

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "N",   # pep8-naming
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
  "S",   # flake8-bandit (security)
  "C4",  # flake8-comprehensions
  "SIM", # flake8-simplify
  "RUF", # ruff-specific
]
ignore = [
  "E501",  # line too long — formatter handles it
]

[lint.per-file-ignores]
"**/tests/**" = ["S101", "S105", "S106"]
"**/settings/*.py" = ["F401", "F403", "S105"]
"**/serializers.py" = ["RUF012"]
"**/models.py" = ["RUF012"]
"**/views.py" = ["RUF012"]

[format]
quote-style = "double"
indent-style = "space"
