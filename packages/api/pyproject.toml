[project]
name = "api"
version = "0.1.0"
description = "Instagram-shop backend with Django + AWS Lambda (lab 4)"
requires-python = ">=3.12.10"
dependencies = [
    "boto3>=1.43.9",
    "celery[redis]>=5.4",
    "django>=5",
    "django-cors-headers>=4.9.0",
    "djangorestframework>=3.15",
    "djangorestframework-simplejwt>=5.3",
    "drf-spectacular>=0.29.0",
    "gunicorn>=23",
    "pillow>=12.2.0",
    "psycopg[binary]>=3.2",
    "python-dotenv>=1.0",
    "uvicorn[standard]>=0.32",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
