[project]
name = "cut-image"
version = "0.1.0"
description = "S3-triggered Lambda that resizes uploaded post media."
requires-python = ">=3.12.10"
dependencies = [
    "boto3>=1.43",
    "pillow>=11",
    "requests>=2.32",
]

[build-system]
requires = ["uv_build>=0.11.14,<0.12.0"]
build-backend = "uv_build"
