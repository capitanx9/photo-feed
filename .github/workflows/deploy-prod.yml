name: deploy-prod

# Single source of EC2 changes. Two trigger modes, no overlap:
#
# 1. workflow_run: after cd-api or cd-web finish successfully. They've
#    already pushed a bump commit to main, so we just need to apply.
#    This is the *normal* path on every code push.
#
# 2. push: only for infra-only changes that don't go through cd-* —
#    nginx config, docker-compose.prod.yml, apply.sh itself. These
#    are the cases where there's no new image to build, the host just
#    needs to re-apply.
#
# `infra/prod/images.env` is intentionally NOT in the push trigger —
# bumps to it always come from cd-api / cd-web, and we deploy via the
# workflow_run trigger instead. Otherwise every bump fires deploy-prod
# twice (once on the bump commit's push, once on the cd run completing).
#
# Serialised by a concurrency group so two runs can never race the
# same .env / `docker compose up`.

on:
  workflow_run:
    workflows: ["cd-api", "cd-web"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - "docker-compose.prod.yml"
      - "infra/nginx/**"
      - "infra/ec2/apply.sh"
      - ".github/workflows/deploy-prod.yml"
  workflow_dispatch:

concurrency:
  group: photo-feed-ec2-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  EC2_TAG_KEY: Application
  EC2_TAG_VALUE: photo-feed-api  # same EC2 host hosts both halves

permissions:
  id-token: write   # OIDC for SSM SendCommand
  contents: read

jobs:
  apply:
    runs-on: ubuntu-24.04
    # workflow_run fires for both success and failure. Skip the deploy
    # if the upstream cd-* run failed — the bump commit never landed.
    # For push/workflow_dispatch this expression is always true.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SSM SendCommand → apply on EC2
        id: ssm
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:${EC2_TAG_KEY},Values=${EC2_TAG_VALUE}" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)

          if [ -z "$INSTANCE_ID" ]; then
            echo "::error::No running EC2 with tag ${EC2_TAG_KEY}=${EC2_TAG_VALUE}"
            exit 1
          fi
          echo "instance=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

          # SSM runs as root; drop to ubuntu (owner of /srv/photo-feed,
          # member of docker group). -E is blocked by Ubuntu sudoers so
          # env is passed positionally.
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy-prod ${GITHUB_SHA::12}" \
            --parameters '{
              "commands": [
                "set -euo pipefail",
                "cd /srv/photo-feed",
                "sudo -u ubuntu AWS_REGION=${{ env.AWS_REGION }} bash infra/ec2/apply.sh"
              ],
              "executionTimeout": ["600"]
            }' \
            --output text --query Command.CommandId)
          echo "command=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command
        run: |
          CMD="${{ steps.ssm.outputs.command }}"
          INSTANCE="${{ steps.ssm.outputs.instance }}"
          sleep 3
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD" --instance-id "$INSTANCE" \
              --query Status --output text)
            echo "attempt $i: $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "::error::apply ended with $STATUS"
                echo "----- stdout -----"
                aws ssm get-command-invocation \
                  --command-id "$CMD" --instance-id "$INSTANCE" \
                  --query StandardOutputContent --output text
                echo "----- stderr -----"
                aws ssm get-command-invocation \
                  --command-id "$CMD" --instance-id "$INSTANCE" \
                  --query StandardErrorContent --output text
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::error::apply did not finish in 10 min"
          exit 1
