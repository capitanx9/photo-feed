name: cd-api

# Build the API image, push it to ECR, and bump API_IMAGE_TAG in
# infra/prod/images.env on main. The bump commit triggers deploy-prod.yml,
# which is what actually rolls the new image onto EC2.
#
# This workflow no longer touches EC2 directly. Splitting "build the image"
# from "apply on host" lets us roll back via `git revert` and keeps the
# two halves of the stack (api, web) from racing on /srv/photo-feed/.env.

on:
  push:
    branches: [main]
    paths:
      - "packages/api/**"
      - ".github/workflows/cd-api.yml"
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  ECR_REPO: photo-feed-api
  IMAGE_TAG_KEY: API_IMAGE_TAG  # which line in images.env we own

permissions:
  id-token: write   # OIDC for ECR push
  # Note: contents:write would let the default GITHUB_TOKEN push, but
  # branch-protection rulesets in personal repos can't grant bypass to
  # the built-in `github-actions` actor. We mint a short-lived token
  # from a dedicated GitHub App instead — its identity *can* be added
  # as a bypass actor.

jobs:
  build-and-bump:
    runs-on: ubuntu-24.04
    steps:
      - name: Mint bot App token
        uses: actions/create-github-app-token@v1
        id: bot-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          # Use the App token so `git push` later in the job authenticates
          # as the bot, not as the default github-actions identity.
          token: ${{ steps.bot-token.outputs.token }}

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: image
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          TAG="${GITHUB_SHA::12}"
          echo "registry=$REGISTRY"             >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                       >> "$GITHUB_OUTPUT"
          echo "uri=$REGISTRY/$ECR_REPO:$TAG"   >> "$GITHUB_OUTPUT"
          echo "uri_latest=$REGISTRY/$ECR_REPO:latest" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.image.outputs.uri_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump API_IMAGE_TAG in infra/prod/images.env
        run: |
          set -euo pipefail
          TAG="${{ steps.image.outputs.tag }}"
          FILE=infra/prod/images.env

          git config user.name  "photo-feed-bot[bot]"
          git config user.email "photo-feed-bot[bot]@users.noreply.github.com"

          # Retry loop. On each attempt we re-fetch main and re-apply the
          # awk edit from scratch — that way a concurrent cd-web bump of
          # WEB_IMAGE_TAG can't conflict with us, because we always start
          # from the freshest main and edit only our own line.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            tmp=$(mktemp)
            awk -v new="API_IMAGE_TAG=${TAG}" '
              /^API_IMAGE_TAG=/ { print new; next }
              { print }
            ' "$FILE" > "$tmp"
            mv "$tmp" "$FILE"

            if git diff --quiet -- "$FILE"; then
              echo "No change in $FILE (same tag as before) — skipping commit."
              exit 0
            fi

            git add "$FILE"
            git commit -m "ci(cd-api): bump API_IMAGE_TAG to ${TAG}"

            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt $attempt failed (main moved); resetting and retrying..."
            sleep $((attempt * 2))
          done
          echo "::error::could not push bump after 5 attempts"
          exit 1
