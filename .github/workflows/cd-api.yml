name: cd-api

on:
  push:
    branches: [main]
    paths:
      - "packages/api/**"
      - "docker-compose.prod.yml"
      - "infra/nginx/**"
      - "infra/ec2/**"
      - ".github/workflows/cd-api.yml"
  workflow_dispatch:

concurrency:
  group: cd-api
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  ECR_REPO: photo-feed-api
  EC2_TAG_KEY: Application
  EC2_TAG_VALUE: photo-feed-api

permissions:
  id-token: write   # OIDC
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set IMAGE_URI
        id: image
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          TAG="${GITHUB_SHA::12}"
          echo "registry=$REGISTRY"             >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                       >> "$GITHUB_OUTPUT"
          echo "uri=$REGISTRY/$ECR_REPO:$TAG"   >> "$GITHUB_OUTPUT"
          echo "uri_latest=$REGISTRY/$ECR_REPO:latest" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.image.outputs.uri_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSM SendCommand -> deploy on EC2
        id: ssm
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:${EC2_TAG_KEY},Values=${EC2_TAG_VALUE}" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)

          if [ -z "$INSTANCE_ID" ]; then
            echo "::error::No running EC2 with tag ${EC2_TAG_KEY}=${EC2_TAG_VALUE}"
            exit 1
          fi
          echo "instance=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

          # SSM runs commands as root. We drop to `ubuntu` (member of the docker
          # group) via `sudo -u`, and pass env explicitly — `sudo -E` is denied
          # by the default sudoers policy on Ubuntu 24.04/26.04, so any
          # exported variables would be stripped before `deploy.sh` sees them.
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "cd-api ${GITHUB_SHA::12}" \
            --parameters '{
              "commands": [
                "set -euo pipefail",
                "cd /srv/photo-feed",
                "sudo -u ubuntu AWS_REGION=${{ env.AWS_REGION }} ECR_REGISTRY=${{ steps.image.outputs.registry }} ECR_REPO=${{ env.ECR_REPO }} IMAGE_TAG=${{ steps.image.outputs.tag }} bash infra/ec2/deploy.sh"
              ],
              "executionTimeout": ["600"]
            }' \
            --output text --query Command.CommandId)
          echo "command=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command
        run: |
          CMD="${{ steps.ssm.outputs.command }}"
          INSTANCE="${{ steps.ssm.outputs.instance }}"
          # Brief warm-up so the first describe-call doesn't race the agent.
          sleep 3
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD" --instance-id "$INSTANCE" \
              --query Status --output text)
            echo "attempt $i: $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "::error::deploy ended with $STATUS"
                echo "----- stdout -----"
                aws ssm get-command-invocation \
                  --command-id "$CMD" --instance-id "$INSTANCE" \
                  --query StandardOutputContent --output text
                echo "----- stderr -----"
                aws ssm get-command-invocation \
                  --command-id "$CMD" --instance-id "$INSTANCE" \
                  --query StandardErrorContent --output text
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::error::deploy did not finish in 10 min"
          exit 1
