name: cd-api

# Build the API image, push it to ECR, and bump API_IMAGE_TAG in
# infra/prod/images.env on main. The bump commit triggers deploy-prod.yml,
# which is what actually rolls the new image onto EC2.
#
# This workflow no longer touches EC2 directly. Splitting "build the image"
# from "apply on host" lets us roll back via `git revert` and keeps the
# two halves of the stack (api, web) from racing on /srv/photo-feed/.env.

on:
  push:
    branches: [main]
    paths:
      - "packages/api/**"
      - ".github/workflows/cd-api.yml"
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  ECR_REPO: photo-feed-api
  IMAGE_TAG_KEY: API_IMAGE_TAG  # which line in images.env we own

permissions:
  id-token: write   # OIDC (ECR push)
  contents: write   # commit images.env back to main

jobs:
  build-and-bump:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: image
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          TAG="${GITHUB_SHA::12}"
          echo "registry=$REGISTRY"             >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                       >> "$GITHUB_OUTPUT"
          echo "uri=$REGISTRY/$ECR_REPO:$TAG"   >> "$GITHUB_OUTPUT"
          echo "uri_latest=$REGISTRY/$ECR_REPO:latest" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.image.outputs.uri_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump API_IMAGE_TAG in infra/prod/images.env
        run: |
          set -euo pipefail
          TAG="${{ steps.image.outputs.tag }}"
          FILE=infra/prod/images.env

          # Rewrite the API_IMAGE_TAG line in place. Preserve everything else
          # (header comments, the WEB line).
          tmp=$(mktemp)
          awk -v new="API_IMAGE_TAG=${TAG}" '
            /^API_IMAGE_TAG=/ { print new; next }
            { print }
          ' "$FILE" > "$tmp"
          mv "$tmp" "$FILE"

          if git diff --quiet -- "$FILE"; then
            echo "No change in $FILE (same tag as before) — skipping commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "ci(cd-api): bump API_IMAGE_TAG to ${TAG}"
          # Retry once if main moved while we were building.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt $attempt failed, rebasing on main and retrying..."
            git pull --rebase origin main
          done
          echo "::error::could not push bump after 3 attempts"
          exit 1
