name: cd-web

# Twin of cd-api for the Next.js half: build → push → bump WEB_IMAGE_TAG.
# The bump commit on main is what triggers deploy-prod.yml.

on:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - ".github/workflows/cd-web.yml"
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  ECR_REPO: photo-feed-web

permissions:
  id-token: write
  contents: write

jobs:
  build-and-bump:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: image
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          TAG="${GITHUB_SHA::12}"
          echo "registry=$REGISTRY"             >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                       >> "$GITHUB_OUTPUT"
          echo "uri=$REGISTRY/$ECR_REPO:$TAG"   >> "$GITHUB_OUTPUT"
          echo "uri_latest=$REGISTRY/$ECR_REPO:latest" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.image.outputs.uri_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump WEB_IMAGE_TAG in infra/prod/images.env
        run: |
          set -euo pipefail
          TAG="${{ steps.image.outputs.tag }}"
          FILE=infra/prod/images.env

          tmp=$(mktemp)
          awk -v new="WEB_IMAGE_TAG=${TAG}" '
            /^WEB_IMAGE_TAG=/ { print new; next }
            { print }
          ' "$FILE" > "$tmp"
          mv "$tmp" "$FILE"

          if git diff --quiet -- "$FILE"; then
            echo "No change in $FILE — skipping commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "ci(cd-web): bump WEB_IMAGE_TAG to ${TAG}"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt $attempt failed, rebasing on main and retrying..."
            git pull --rebase origin main
          done
          echo "::error::could not push bump after 3 attempts"
          exit 1
