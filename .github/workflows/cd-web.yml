name: cd-web

# Twin of cd-api for the Next.js half: build → push → bump WEB_IMAGE_TAG.
# The bump commit on main is what triggers deploy-prod.yml.

on:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - ".github/workflows/cd-web.yml"
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  ECR_REPO: photo-feed-web

permissions:
  id-token: write   # OIDC for ECR push
  # See cd-api.yml — we push via a dedicated bot GitHub App so the
  # ruleset on main can grant bypass to that App's identity.

jobs:
  build-and-bump:
    runs-on: ubuntu-24.04
    steps:
      - name: Mint bot App token
        uses: actions/create-github-app-token@v1
        id: bot-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.bot-token.outputs.token }}

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: image
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          TAG="${GITHUB_SHA::12}"
          echo "registry=$REGISTRY"             >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                       >> "$GITHUB_OUTPUT"
          echo "uri=$REGISTRY/$ECR_REPO:$TAG"   >> "$GITHUB_OUTPUT"
          echo "uri_latest=$REGISTRY/$ECR_REPO:latest" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.image.outputs.uri_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump WEB_IMAGE_TAG in infra/prod/images.env
        run: |
          set -euo pipefail
          TAG="${{ steps.image.outputs.tag }}"
          FILE=infra/prod/images.env

          git config user.name  "photo-feed-bot[bot]"
          git config user.email "photo-feed-bot[bot]@users.noreply.github.com"

          # See cd-api.yml for why we re-apply the edit on each retry
          # instead of rebasing — it sidesteps merge conflicts with the
          # sibling cd-api workflow editing the other line in this file.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            tmp=$(mktemp)
            awk -v new="WEB_IMAGE_TAG=${TAG}" '
              /^WEB_IMAGE_TAG=/ { print new; next }
              { print }
            ' "$FILE" > "$tmp"
            mv "$tmp" "$FILE"

            if git diff --quiet -- "$FILE"; then
              echo "No change in $FILE (same tag as before) — skipping commit."
              exit 0
            fi

            git add "$FILE"
            git commit -m "ci(cd-web): bump WEB_IMAGE_TAG to ${TAG}"

            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt $attempt failed (main moved); resetting and retrying..."
            sleep $((attempt * 2))
          done
          echo "::error::could not push bump after 5 attempts"
          exit 1
