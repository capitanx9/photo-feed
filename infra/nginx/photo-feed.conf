# nginx config for photo-feed on EC2.
#
# Two upstreams:
#   django — gunicorn on the web service (API + admin)
#   next   — node server on the web-front service (Next.js standalone)
#
# Two server blocks: 80 only redirects to 443 (with an HTTP-01 challenge
# exception for certbot), 443 terminates TLS. Path-based routing inside
# the 443 block sends /api/, /admin/, /static/, /media/, /internal/ to
# django; everything else (including /_next/) to next.

upstream django {
    server web:8000;
}

upstream next {
    server web-front:3000;
}

# ----------------------------------------------------------------------
# Port 80 — ACME challenge + redirect
# ----------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name photo-feed.gotdns.ch;

    # Let's Encrypt HTTP-01 challenge files live here. certbot writes them
    # into this volume, nginx serves them over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: force HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------------------
# Port 443 — TLS + reverse proxy
# ----------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name photo-feed.gotdns.ch;

    ssl_certificate     /etc/letsencrypt/live/photo-feed.gotdns.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/photo-feed.gotdns.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Uploads go directly to S3 via presigned URLs so the API itself
    # only sees small JSON bodies (upload-url request, post create).
    client_max_body_size 2m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    # --- Django ------------------------------------------------------
    # /api/      — REST + auth + cart + checkout + posts/upload-url …
    # /admin/    — Django admin
    # /static/   — collectstatic
    # /media/    — uploaded files (when not S3)
    # /internal/ — Lambda webhook (HMAC, not user-facing)
    location ~ ^/(api|admin|static|media|internal)/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # --- Next.js -----------------------------------------------------
    # Everything else, including /_next/ static chunks and App Router
    # pages. The Node server handles its own cache headers on /_next/static.
    location / {
        proxy_pass http://next;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
