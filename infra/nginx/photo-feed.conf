# nginx config for photo-feed on EC2.
#
# Two server blocks: 80 only redirects to 443 (with an HTTP-01 challenge
# exception for certbot), 443 terminates TLS and proxies to gunicorn.
#
# Cert paths assume certbot's standard layout under /etc/letsencrypt/
# mounted into this container. See infra/ec2-setup.md for the one-shot
# initial certbot certonly run.

upstream django {
    server web:8000;
}

# ----------------------------------------------------------------------
# Port 80 — ACME challenge + redirect
# ----------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name photo-feed.gotdns.ch;

    # Let's Encrypt HTTP-01 challenge files live here. certbot writes them
    # into this volume, nginx serves them over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: force HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------------------
# Port 443 — TLS + reverse proxy to Django
# ----------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name photo-feed.gotdns.ch;

    ssl_certificate     /etc/letsencrypt/live/photo-feed.gotdns.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/photo-feed.gotdns.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Reasonable defaults — uploads can be big-ish (presigned URLs go
    # directly to S3 so Django itself sees only the upload-url POST).
    client_max_body_size 2m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location / {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
