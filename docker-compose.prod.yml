# Production stack on EC2.
#
# Secrets come from .env (written by infra/ec2/deploy.sh from SSM
# Parameter Store on every deploy). Non-secret config is set here as
# `environment:` so the compose file is the source of truth for shape.
#
# Web image is pulled from ECR — IMAGE_URI is set by deploy.sh per
# rollout (so the workflow controls which tag is live).

services:
  web:
    image: ${IMAGE_URI}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: api.settings.prod
      DJANGO_DEBUG: "0"

      # gunicorn doesn't go through manage.py (which inserts ./src into
      # sys.path), so we put the src dir on PYTHONPATH explicitly here.
      PYTHONPATH: /app/packages/api/src

      ALLOWED_HOSTS: photo-feed.gotdns.ch
      CSRF_TRUSTED_ORIGINS: https://photo-feed.gotdns.ch
      CORS_ALLOWED_ORIGINS: https://photo-feed.gotdns.ch

      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: api
      POSTGRES_USER: api

      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      AWS_REGION: eu-central-1
      S3_UPLOADS_BUCKET: photo-feed-uploads
      S3_GENERATED_BUCKET: photo-feed-generated-usw2
      S3_GENERATED_REGION: us-west-2
      BEDROCK_REGION: us-west-2
      # Empty -> boto3 talks to real AWS, not MinIO.
      AWS_S3_ENDPOINT_URL: ""
      AWS_S3_PUBLIC_ENDPOINT_URL: ""

      RATELIMIT_ENABLE: "True"
    command:
      - gunicorn
      - --bind=0.0.0.0:8000
      - --workers=3
      - --access-logfile=-
      - --error-logfile=-
      - api.wsgi:application
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: api
      POSTGRES_USER: api
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api -d api"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/photo-feed.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web

  # Renewal daemon. The first certificate must be issued manually via
  # `docker compose run --rm certbot certonly ...` — see
  # infra/ec2-setup.md. After that, this loop quietly renews every 12 h.
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c
      "trap exit TERM;
       while :;
       do
         certbot renew --webroot -w /var/www/certbot --quiet || true;
         sleep 12h & wait $${!};
       done"

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  certbot_www:
